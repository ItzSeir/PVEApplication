<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報名清單</title>

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}

.container{max-width:1400px;margin:auto;padding:20px}

.days{display:flex;flex-direction:column;gap:20px}

.day-card{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:16px;
}

.slot-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

.slot-card{
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
}

.slot-card.has-members{background:rgba(110,168,255,.15)}
.slot-card.full-team{background:rgba(255,107,129,.25)}

.member{display:flex;justify-content:space-between;margin:4px 0}

button{cursor:pointer;border:none;border-radius:8px;padding:6px 10px}

.add-btn{background:#333;color:#fff}
.remove-btn{color:#ff6b81;background:none}

/* ⭐推薦 */
.star{color:gold;font-size:12px;margin-left:6px}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.modal.show{display:flex}

.modal-box{
  background:#1f2937;
  padding:20px;
  border-radius:16px;
  width:300px;
}

.modal-box input,.modal-box select{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:#fff;
}

.modal-actions{display:flex;gap:10px}
.modal-actions button{flex:1}
</style>
</head>

<body>
<div class="container">
<div id="app" class="days"></div>
</div>

<!-- modal -->
<div id="signupModal" class="modal">
  <div class="modal-box">
    <h3>報名</h3>
    <input id="playerName" placeholder="輸入名字">
    <select id="roleSelect"></select>
    <div class="modal-actions">
      <button onclick="submitSignup()">確認</button>
      <button onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3NalXMRjiag_26-g82UtxeDvuSjydg30",
  authDomain: "pve-ab4a8.firebaseapp.com",
  projectId: "pve-ab4a8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data={};
let currentSignup={};

function today(){let d=new Date();d.setHours(0,0,0,0);return d;}
function add(d,i){let x=new Date(d);x.setDate(x.getDate()+i);return x;}
function key(d){return d.toISOString().split("T")[0];}

function isWeekend(d){
  let day=d.getDay();
  return day===0||day===6;
}

function defaultDay(date){
  let weekday=["19:45","20:30","21:30"];
  let weekend=["14:00","16:00","18:00"];

  let times=isWeekend(date)?weekend:weekday;

  return {slots:times.map(t=>({
    time:t,
    members:[],
    isCustom:false
  }))};
}

async function init(){
  let t=today();
  for(let i=0;i<5;i++){
    let d=add(t,i);
    let k=key(d);
    let ref=doc(db,"schedule",k);
    let snap=await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref,defaultDay(d));
    }
  }
}

function render(){
  let el=document.getElementById("app");
  let html="";
  let t=today();

  for(let i=0;i<5;i++){
    let d=add(t,i);
    let k=key(d);
    let day=data[k];
    if(!day) continue;

    html+=`<div class="day-card"><div>${k}</div><div class="slot-list">`;

    day.slots.forEach((s,si)=>{
      let cls="slot-card";
      if(s.members.length>=10) cls+=" full-team";
      else if(s.members.length>0) cls+=" has-members";

      let star = (!isWeekend(d) && s.time==="19:45") ? `<span class="star">★推薦</span>` : "";

      html+=`<div class="${cls}">
        <b>${s.time}${star}</b> (${s.members.length}/10)
      `;

      s.members.forEach((m,mi)=>{
        html+=`
        <div class="member">
          ${m.name}(${m.role})
          <button class="remove-btn" onclick="removeMember('${k}',${si},${mi})">刪</button>
        </div>`;
      });

      html+=`
      <button class="add-btn" onclick="openModal('${k}',${si})">＋報名</button>
      </div>`;
    });

    html+="</div></div>";
  }

  el.innerHTML=html;
}

window.openModal=(k,i)=>{
  currentSignup={k,i};

  let select=document.getElementById("roleSelect");
  select.innerHTML="";

  ["輸出","承傷","治療"].forEach(r=>{
    let opt=document.createElement("option");
    opt.value=r;
    opt.textContent=r;
    select.appendChild(opt);
  });

  document.getElementById("signupModal").classList.add("show");
};

window.closeModal=()=>{
  document.getElementById("signupModal").classList.remove("show");
};

window.submitSignup=async ()=>{
  let name=document.getElementById("playerName").value.trim();
  let role=document.getElementById("roleSelect").value;

  if(!name){alert("輸入名字");return;}

  let {k,i}=currentSignup;
  let d=structuredClone(data[k]);

  d.slots[i].members.push({name,role});

  await setDoc(doc(db,"schedule",k),d);
  closeModal();
};

window.removeMember=async (k,i,m)=>{
  let d=structuredClone(data[k]);
  let member=d.slots[i].members[m];

  if(!confirm(`刪除 ${member.name}?`)) return;

  d.slots[i].members.splice(m,1);
  await setDoc(doc(db,"schedule",k),d);
};

onSnapshot(collection(db,"schedule"),snap=>{
  data={};
  snap.forEach(doc=>data[doc.id]=doc.data());
  render();
});

await init();
render();
</script>
</body>
</html>
