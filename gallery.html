<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
}

/* ===== base ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
    radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
  min-height: 100vh;
}

/* ===== navbar ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.topbar-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-group { display: flex; gap: 8px; }

.brand-badge {
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 700;
}

.brand-badge.sub { color: var(--muted); }

.nav { display: flex; gap: 8px; }

.nav a {
  text-decoration: none;
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.nav a.home-btn {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.nav a.active:not(.home-btn) {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

/* ===== container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== title area design ===== */
.page-header {
  text-align: center;
  margin-bottom: 50px;
  position: relative;
}

.page-title {
  font-size: 42px;
  font-weight: 800;
  margin: 0;
  background: linear-gradient(to right, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 4px;
}

.page-subtitle {
  color: var(--muted);
  margin-top: 12px;
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0.8;
}

.page-header::after {
  content: "";
  display: block;
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin: 20px auto 0;
  border-radius: 2px;
}

/* ===== filter buttons美化 ===== */
.filter {
  text-align: center;
  margin-bottom: 40px;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.filter button {
  padding: 12px 28px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.03);
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  backdrop-filter: blur(10px);
}

.filter button:hover {
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  transform: translateY(-3px);
  border-color: rgba(255, 255, 255, 0.3);
}

.filter .active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border-color: transparent;
  box-shadow: 0 8px 20px rgba(110, 168, 255, 0.3);
}

/* ===== masonry grid & items比例與動畫 ===== */
.grid {
  position: relative;
  width: 100%;
  margin-top: 20px;
}

.item {
  position: absolute;
  /* 初始寬度由 JS 計算以精確控制一行三個 */
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background-color: var(--panel);
  /* 關鍵切換動畫 */
  transition: 
    transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
    opacity 0.5s ease, 
    filter 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.item:hover {
  filter: brightness(1.1);
  z-index: 10;
}

.item.hide {
  opacity: 0;
  transform: scale(0.8) translate(0, 50px) !important; /* 強制覆蓋 JS 的 translate */
  pointer-events: none;
}

.gallery-img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.8s ease;
}

.item:hover .gallery-img {
  transform: scale(1.08);
}

/* ===== hover info ===== */
.gallery-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 25px 20px;
  background: linear-gradient(to top, rgba(11, 16, 32, 0.95) 0%, rgba(11, 16, 32, 0.6) 50%, transparent 100%);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
  z-index: 2;
}

.item:hover .gallery-info {
  opacity: 1;
  transform: translateY(0);
}

.gallery-info .date {
  font-size: 11px;
  color: var(--gold);
  display: block;
  margin-bottom: 4px;
  font-weight: 700;
  letter-spacing: 1px;
}

.gallery-info .title {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* ===== lightbox ===== */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(7, 10, 20, 0.96);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(15px);
}

.lightbox.show { display: flex; }

.lightbox-inner {
  max-width: 1000px;
  width: 90%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.lightbox img {
  max-width: 100%;
  max-height: 75vh;
  width: auto;
  height: auto;
  margin: auto;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.lb-meta {
  background: rgba(255,255,255,.05);
  padding: 24px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}

.lb-date { font-size: 12px; color: var(--gold); font-weight: 600;}
.lb-title { font-size: 22px; font-weight: 800; margin: 5px 0 10px; }
.lb-desc { font-size: 15px; color: var(--muted); line-height: 1.6; }

/* arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 60px;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: 0.3s;
  user-select: none;
  padding: 20px;
}

.arrow:hover { color: var(--accent); }
.left { left: 20px; }
.right { right: 20px; }

</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖回憶錄</span>
    </div>

    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html" class="active">江湖回憶錄</a>
    </div>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1 class="page-title">夢回花深處</h1>
    <p class="page-subtitle">MEMORIES OF JIANGHU</p>
  </div>

  <div class="filter">
    <button class="active" data-filter="all">全部回憶</button>
    <button data-filter="nye">歲末跨年</button>
    <button data-filter="daily">江湖日常</button>
  </div>

  <div class="grid" id="grid">

    <div class="item" data-category="nye"
         data-title="跨年合照"
         data-date="2026.01.01"
         data-desc="那一晚煙火與歡笑交織，我們一起迎接新的江湖篇章。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.01.01</span>
        <span class="title">跨年合照</span>
      </div>
    </div>

    <div class="item v2" data-category="daily"
         data-title="夢回舞獅團"
         data-date="2026.02.13"
         data-desc="夢回舞獅團出戰！慶祝江湖盛世。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.13</span>
        <span class="title">夢回舞獅團</span>
      </div>
    </div>

    <div class="item" data-category="daily"
         data-title="搖滾歌手"
         data-date="2026.02.16"
         data-desc="這是搖滾歌手還是殺手？在花深處的音律之夜。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.16</span>
        <span class="title">搖滾歌手 @曲絡寧</span>
      </div>
    </div>

  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="arrow left" id="prev">‹</div>
  <div class="lightbox-inner">
    <img id="light-img">
    <div class="lb-meta">
      <div class="lb-date" id="lb-date"></div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-desc" id="lb-desc"></div>
    </div>
  </div>
  <div class="arrow right" id="next">›</div>
</div>

<script>
const grid = document.getElementById('grid');
const items = Array.from(document.querySelectorAll('.item'));
let current = 0;

/* 強化版 Masonry 佈局：固定一行三個圖片 */
function layout(){
  const width = grid.offsetWidth;
  const cols = window.innerWidth < 768 ? (window.innerWidth < 500 ? 1 : 2) : 3; // 桌面端固定 3 欄
  
  const gutter = 20; // 間距
  const colWidth = (width - (gutter * (cols - 1))) / cols;
  
  const heights = Array(cols).fill(0);

  items.forEach(item => {
    if(item.classList.contains('hide')) {
        // 隱藏時不參與高度計算
        return;
    }

    const isBig = item.classList.contains('v2') && cols > 1;
    let col = heights.indexOf(Math.min(...heights));

    // 寬圖跨欄處理
    if (isBig && col === cols - 1) col = cols - 2;

    const x = col * (colWidth + gutter);
    const y = heights[col];

    // 設定寬度並定位
    const currentItemWidth = isBig ? (colWidth * 2 + gutter) : colWidth;
    item.style.width = `${currentItemWidth}px`;
    item.style.transform = `translate(${x}px, ${y}px)`;

    const h = item.offsetHeight + gutter;

    if(isBig){
      const maxH = Math.max(heights[col] + h, heights[col+1] + h);
      heights[col] = maxH;
      heights[col+1] = maxH;
    } else {
      heights[col] += h;
    }
  });

  grid.style.height = Math.max(...heights) + 'px';
}

/* 篩選器觸發動畫 */
document.querySelectorAll('.filter button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const f = btn.dataset.filter;

    items.forEach(item => {
      if(f === 'all' || item.dataset.category === f) {
        item.classList.remove('hide');
      } else {
        item.classList.add('hide');
      }
    });

    // 延遲執行 layout 以確保動畫平滑
    requestAnimationFrame(layout);
  };
});

/* Lightbox 邏輯 */
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('light-img');
const lbTitle = document.getElementById('lb-title');
const lbDate = document.getElementById('lb-date');
const lbDesc = document.getElementById('lb-desc');

function show(i){
  const visibleItems = items.filter(item => !item.classList.contains('hide'));
  const target = visibleItems[i] || visibleItems[0];
  if(!target) return;
  
  lightImg.src = target.querySelector('img').src;
  lbTitle.textContent = target.dataset.title;
  lbDate.textContent = target.dataset.date;
  lbDesc.textContent = target.dataset.desc;
}

items.forEach((item) => {
  item.onclick = () => {
    const visibleItems = items.filter(i => !i.classList.contains('hide'));
    current = visibleItems.indexOf(item);
    show(current);
    lightbox.classList.add('show');
  };
});

document.getElementById('next').onclick = () => {
  const visibleItems = items.filter(i => !i.classList.contains('hide'));
  current = (current + 1) % visibleItems.length;
  show(current);
};

document.getElementById('prev').onclick = () => {
  const visibleItems = items.filter(i => !i.classList.contains('hide'));
  current = (current - 1 + visibleItems.length) % visibleItems.length;
  show(current);
};

lightbox.onclick = e => { if(e.target === lightbox) lightbox.classList.remove('show'); };

// 監聽圖片加載以確保高度正確
window.addEventListener('load', layout);
window.addEventListener('resize', layout);
// 圖片加載後再次觸發，防止 offsetHeight 為 0
items.forEach(item => {
  item.querySelector('img').onload = layout;
});
</script>

</body>
</html>
