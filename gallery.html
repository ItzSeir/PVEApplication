<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
}

/* ===== Base ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.15), transparent 30%),
    radial-gradient(circle at top right, rgba(139,92,246,.15), transparent 30%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
}

/* ===== Navbar（還原你的風格） ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.topbar-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-group { display: flex; gap: 8px; }

.brand-badge {
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 700;
}

.brand-badge.sub { color: var(--muted); }

.nav { display: flex; gap: 8px; }

.nav a {
  text-decoration: none;
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.nav a.home-btn {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.nav a.active:not(.home-btn) {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

/* ===== Container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== Filter ===== */
.filter{
  text-align:center;
  margin-bottom:20px;
}

.filter button{
  margin:5px;
  padding:8px 16px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:rgba(255,255,255,.05);
  color:var(--text);
}

.filter .active{
  background:var(--accent);
}

/* ===== Masonry ===== */
.grid{
  position:relative;
}

.item{
  position:absolute;
  width:calc(33.333% - 12px);
  margin:6px;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition: transform .4s, opacity .4s;
}

.item img{
  width:100%;
  display:block;
}

/* 大卡 */
.item.v2{
  width:calc(66.666% - 12px);
}

.item.hide{
  opacity:0;
  transform:scale(.85);
}

/* ===== Lightbox ===== */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lightbox.show{ display:flex; }

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:14px;
}

.arrow{
  position:absolute;
  top:50%;
  font-size:40px;
  cursor:pointer;
  user-select:none;
}

.left{ left:30px; }
.right{ right:30px; }

</style>
</head>

<body>

<!-- Navbar -->
<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖回憶錄</span>
    </div>

    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html" class="active">江湖回憶錄</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="filter">
  <button class="active" data-filter="all">全部</button>
  <button data-filter="nye">跨年</button>
  <button data-filter="daily">日常</button>
</div>

<div class="grid" id="grid">

  <div class="gallery-grid">
    <div class="gallery-item" data-category="nye">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.01.01</span>
        <span class="title">跨年合照</span>
      </div>
    </div>
  <div class="gallery-grid">
    <div class="gallery-item" data-category="daily">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.13</span>
        <span class="title">夢回舞獅團</span>
      </div>
    </div>
    <div class="gallery-item" data-category="daily">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png"class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.16</span>
        <span class="title">搖滾歌手 @曲絡寧</span>

</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="arrow left" id="prev">‹</div>
  <img id="light-img">
  <div class="arrow right" id="next">›</div>
</div>

<script>
const grid = document.getElementById('grid');
const items = Array.from(document.querySelectorAll('.item'));
let current = 0;

/* masonry */
function layout(){
  const cols = window.innerWidth < 768 ? 1 :
               window.innerWidth < 1100 ? 2 : 3;

  const heights = Array(cols).fill(0);

  items.forEach(item=>{
    if(item.classList.contains('hide')) return;

    const span = item.classList.contains('v2') ? 2 : 1;

    let col = heights.indexOf(Math.min(...heights));

    const x = col * (100/cols);
    const y = heights[col];

    item.style.transform = `translate(${x}%, ${y}px)`;

    const h = item.offsetHeight + 12;

    heights[col] += h;
    if(span===2 && col+1<cols){
      heights[col+1] += h;
    }
  });

  grid.style.height = Math.max(...heights)+'px';
}

/* filter */
document.querySelectorAll('.filter button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const f=btn.dataset.filter;

    items.forEach(item=>{
      if(f==='all'||item.dataset.category===f){
        item.classList.remove('hide');
      }else{
        item.classList.add('hide');
      }
    });

    setTimeout(layout,300);
  };
});

/* lightbox */
const lightbox=document.getElementById('lightbox');
const lightImg=document.getElementById('light-img');

items.forEach((item,i)=>{
  item.onclick=()=>{
    current=i;
    lightImg.src=item.querySelector('img').src;
    lightbox.classList.add('show');
  };
});

document.getElementById('next').onclick=()=>{
  current=(current+1)%items.length;
  lightImg.src=items[current].querySelector('img').src;
};

document.getElementById('prev').onclick=()=>{
  current=(current-1+items.length)%items.length;
  lightImg.src=items[current].querySelector('img').src;
};

lightbox.onclick=e=>{
  if(e.target===lightbox) lightbox.classList.remove('show');
};

window.addEventListener('load',layout);
window.addEventListener('resize',layout);
</script>

</body>
</html>
