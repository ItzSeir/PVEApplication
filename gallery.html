<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
}

/* ===== base ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
    radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
  min-height: 100vh;
}

/* ===== navbar ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.topbar-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-group { display: flex; gap: 8px; }

.brand-badge {
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 700;
}

.brand-badge.sub { color: var(--muted); }

.nav { display: flex; gap: 8px; }

.nav a {
  text-decoration: none;
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.nav a.home-btn {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.nav a.active:not(.home-btn) {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

/* ===== container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== title area design ===== */
.page-header {
  text-align: center;
  margin-bottom: 50px;
  position: relative;
}

.page-title {
  font-size: 42px;
  font-weight: 800;
  margin: 0;
  background: linear-gradient(to right, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 4px;
}

.page-subtitle {
  color: var(--muted);
  margin-top: 12px;
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0.8;
}

.page-header::after {
  content: "";
  display: block;
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin: 20px auto 0;
  border-radius: 2px;
}

/* ===== filter buttons ===== */
.filter {
  text-align: center;
  margin-bottom: 40px;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.filter button {
  padding: 12px 28px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.03);
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  backdrop-filter: blur(10px);
}

.filter .active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border-color: transparent;
  box-shadow: 0 8px 20px rgba(110, 168, 255, 0.3);
}

/* ===== pinterest masonry grid ===== */
.grid {
  position: relative;
  width: 100%;
  margin-top: 20px;
  /* 移除固定高度，由 JS 動態更新 */
  transition: height 0.5s ease;
}

.item {
  position: absolute;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background-color: var(--panel);
  /* 移除 aspect-ratio，讓圖片決定高度 */
  
  transition: 
    transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
    opacity 0.5s ease,
    top 0.6s cubic-bezier(0.4, 0, 0.2, 1),
    left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.item.hide {
  opacity: 0;
  transform: scale(0.8) translate(0, 50px) !important;
  pointer-events: none;
}

.gallery-img {
  width: 100%;
  height: auto; /* Pinterest 風格必須是 auto */
  display: block;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.item:hover .gallery-img {
  transform: scale(1.05);
}

/* ===== hover info ===== */
.gallery-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 25px 20px;
  background: linear-gradient(to top, rgba(11, 16, 32, 0.95) 0%, transparent 100%);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}

.item:hover .gallery-info {
  opacity: 1;
  transform: translateY(0);
}

.gallery-info .date { font-size: 11px; color: var(--gold); display: block; margin-bottom: 4px;}
.gallery-info .title { font-size: 16px; font-weight: 700; color: #fff; }

/* ===== lightbox ===== */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(7, 10, 20, 0.96);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(15px);
}
.lightbox.show { display: flex; }
.lightbox-inner { max-width: 1000px; width: 90%; display: flex; flex-direction: column; gap: 20px; }
.lightbox img { max-width: 100%; max-height: 75vh; margin: auto; object-fit: contain; border-radius: 12px; }
.lb-meta { background: rgba(255,255,255,.05); padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
.lb-date { color: var(--gold); font-size: 12px; }
.lb-title { font-size: 22px; font-weight: 800; margin: 5px 0; }
.lb-desc { color: var(--muted); font-size: 15px; }
.arrow { position: absolute; top: 50%; font-size: 60px; color: rgba(255,255,255,0.2); cursor: pointer; padding: 20px; transform: translateY(-50%); }
.arrow:hover { color: var(--accent); }
.left { left: 20px; }
.right { right: 20px; }

</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖回憶錄</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html" class="active">江湖回憶錄</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">夢回花深處</h1>
    <p class="page-subtitle">MEMORIES OF JIANGHU</p>
  </div>

  <div class="filter">
    <button class="active" data-filter="all">全部回憶</button>
    <button data-filter="nye">歲末跨年</button>
    <button data-filter="daily">江湖日常</button>
  </div>

  <div class="grid" id="grid">
    <div class="item" data-category="nye" data-title="跨年合照" data-date="2026.01.01" data-desc="迎接新的江湖篇章。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.01.01</span>
        <span class="title">跨年合照</span>
      </div>
    </div>

    <div class="item" data-category="daily" data-title="夢回舞獅團" data-date="2026.02.13" data-desc="慶祝江湖盛世。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.13</span>
        <span class="title">夢回舞獅團</span>
      </div>
    </div>

    <div class="item v2" data-category="daily" data-title="搖滾歌手" data-date="2026.02.16" data-desc="在花深處的音律之夜。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.16</span>
        <span class="title">搖滾歌手 @曲絡寧</span>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="arrow left" id="prev">‹</div>
  <div class="lightbox-inner">
    <img id="light-img">
    <div class="lb-meta">
      <div class="lb-date" id="lb-date"></div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-desc" id="lb-desc"></div>
    </div>
  </div>
  <div class="arrow right" id="next">›</div>
</div>

<script>
const grid = document.getElementById('grid');
const items = Array.from(document.querySelectorAll('.item'));

function layout(){
  const containerWidth = grid.offsetWidth;
  // 決定欄數
  const cols = window.innerWidth > 900 ? 3 : (window.innerWidth < 600 ? 1 : 2);
  const gutter = 20;
  const colWidth = (containerWidth - (gutter * (cols - 1))) / cols;

  const heights = Array(cols).fill(0);

  items.forEach(item => {
    if(item.classList.contains('hide')){
      item.style.opacity = '0';
      // 隱藏時稍微縮小以配合動畫
      item.style.transform = `scale(0.8) translate(0, 50px)`;
      return;
    }

    item.style.opacity = '1';

    // Pinterest 風格中 v2 如果要佔兩格，邏輯如下：
    const isBig = item.classList.contains('v2') && cols >= 2;
    
    // 找到高度最小的欄位
    let col = heights.indexOf(Math.min(...heights));

    // 如果是寬圖且在最後一欄，強制往前移一欄以免爆出去
    if(isBig && col === cols - 1) col = cols - 2;

    const width = isBig ? (colWidth * 2 + gutter) : colWidth;
    
    // 設定寬度後，讓瀏覽器計算真實高度
    item.style.width = `${width}px`;
    
    // 獲取圖片適應寬度後的真實高度
    const itemHeight = item.offsetHeight; 

    const x = col * (colWidth + gutter);
    const y = heights[col];

    item.style.transform = `translate(${x}px, ${y}px)`;

    const totalItemHeight = itemHeight + gutter;

    if(isBig){
      // 寬圖同時影響兩欄的高度，取最大值後填平
      const newHeight = Math.max(heights[col], heights[col+1]) + totalItemHeight;
      heights[col] = newHeight;
      heights[col+1] = newHeight;
    } else {
      heights[col] += totalItemHeight;
    }
  });

  // 更新容器高度以確保背景延伸
  grid.style.height = Math.max(...heights) + 'px';
}

// 篩選邏輯
document.querySelectorAll('.filter button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    items.forEach(item => {
      item.classList.toggle('hide', !(f === 'all' || item.dataset.category === f));
    });
    // 動畫啟動後重新計算佈局
    setTimeout(layout, 100);
  };
});

/* Lightbox 邏輯 */
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('light-img');
const lbTitle = document.getElementById('lb-title');
const lbDate = document.getElementById('lb-date');
const lbDesc = document.getElementById('lb-desc');
let currentIdx = 0;

function showLightbox(idx){
  const visibleItems = items.filter(i => !i.classList.contains('hide'));
  const target = visibleItems[idx];
  if(!target) return;
  lightImg.src = target.querySelector('img').src;
  lbTitle.textContent = target.dataset.title;
  lbDate.textContent = target.dataset.date;
  lbDesc.textContent = target.dataset.desc;
}

items.forEach(item => {
  item.onclick = () => {
    const visibleItems = items.filter(i => !i.classList.contains('hide'));
    currentIdx = visibleItems.indexOf(item);
    showLightbox(currentIdx);
    lightbox.classList.add('show');
  };
});

document.getElementById('next').onclick = () => {
  const visibleItems = items.filter(i => !i.classList.contains('hide'));
  currentIdx = (currentIdx + 1) % visibleItems.length;
  showLightbox(currentIdx);
};

document.getElementById('prev').onclick = () => {
  const visibleItems = items.filter(i => !i.classList.contains('hide'));
  currentIdx = (currentIdx - 1 + visibleItems.length) % visibleItems.length;
  showLightbox(currentIdx);
};

lightbox.onclick = e => { if(e.target === lightbox) lightbox.classList.remove('show'); };

// 監聽加載與縮放
window.addEventListener('load', layout);
window.addEventListener('resize', layout);

// 關鍵：每張圖載入完成都要重排，Pinterest 才能抓到正確高度
items.forEach(item => {
  const img = item.querySelector('img');
  if (img.complete) {
    layout();
  } else {
    img.onload = layout;
  }
});
</script>

</body>
</html>
