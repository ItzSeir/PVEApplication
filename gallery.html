<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
}

/* ===== base ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
    radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
}

/* ===== navbar ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.topbar-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-group { display: flex; gap: 8px; }

.brand-badge {
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 700;
}

.brand-badge.sub { color: var(--muted); }

.nav { display: flex; gap: 8px; }

.nav a {
  text-decoration: none;
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.nav a.home-btn {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.nav a.active:not(.home-btn) {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

/* ===== container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== title area design ===== */
.page-header {
  text-align: center;
  margin-bottom: 50px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 20px;
}

.page-title {
  font-size: 36px;
  font-weight: 800;
  margin: 0;
  background: linear-gradient(to right, #fff, #b7e0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.page-subtitle {
  color: var(--muted);
  margin-top: 10px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* ===== filter buttons美化 ===== */
.filter {
  text-align: center;
  margin-bottom: 30px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.filter button {
  padding: 10px 24px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 30px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s ease;
  backdrop-filter: blur(5px);
}

.filter button:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-2px);
}

.filter .active {
  background: linear-gradient(135deg, #a1cfff, #6ea8ff);
  color: #fff;
  border-color: #a1cfff;
}

/* ===== masonry grid & items比例小一點 ===== */
.grid {
  position: relative;
  width: 100%;
}

.item {
  position: absolute;
  width: calc(33.333% - 10px); /* 比例縮小，三欄佈局 */
  margin: 5px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .4s, opacity .4s;
  background-color: var(--panel);
}

.item.v2 {
  width: calc(66.666% - 10px); /* 兩欄寬度 */
}

.item.hide {
  opacity: 0;
  transform: scale(.85);
  pointer-events: none;
}

/* image size normalization */
.gallery-img {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;
}

/* Adjust sizes for mobile and smaller screens to handle proportion change */
@media (max-width: 800px) {
    .item { width: calc(50% - 10px); }
    .item.v2 { width: calc(100% - 10px); }
}

@media (max-width: 500px) {
    .item { width: calc(100% - 10px); }
    .item.v2 { width: calc(100% - 10px); }
}

/* ===== hover info ===== */
.gallery-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  opacity: 0;
  transform: translateY(20px);
  transition: .3s;
  z-index: 2;
}

.item:hover .gallery-info {
  opacity: 1;
  transform: translateY(0);
}

.gallery-info .date {
  font-size: 12px;
  color: var(--gold);
  display: block;
}

.gallery-info .title {
  font-size: 16px;
  font-weight: 700;
}

/* ===== lightbox ===== */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox.show { display: flex; }

.lightbox-inner {
  max-width: 900px;
  width: 90%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.lightbox img {
  max-width: 100%;
  max-height: 70vh;
  width: auto;
  height: auto;
  margin: auto;
  object-fit: contain;
  border-radius: 16px;
}

.lb-meta {
  background: rgba(255,255,255,.05);
  padding: 16px;
  border-radius: 12px;
}

.lb-date {
  font-size: 12px;
  color: var(--gold);
}

.lb-title {
  font-size: 18px;
  font-weight: 700;
}

.lb-desc {
  font-size: 14px;
  color: var(--muted);
}

/* arrows */
.arrow {
  position: absolute;
  top: 50%;
  font-size: 40px;
  cursor: pointer;
}

.left { left: 30px; }
.right { right: 30px; }

</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖回憶錄</span>
    </div>

    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html" class="active">江湖回憶錄</a>
    </div>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1 class="page-title">夢回花深處</h1>
    <p class="page-subtitle">江湖回憶錄 · 光影集錦</p>
  </div>

  <div class="filter">
    <button class="active" data-filter="all">全部</button>
    <button data-filter="nye">跨年</button>
    <button data-filter="daily">日常</button>
  </div>

  <div class="grid" id="grid">

    <div class="item" data-category="nye"
         data-title="跨年合照"
         data-date="2026.01.01"
         data-desc="那一晚煙火與歡笑交織，我們一起迎接新的江湖篇章。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.01.01</span>
        <span class="title">跨年合照</span>
      </div>
    </div>

    <div class="item v2" data-category="daily"
         data-title="夢回舞獅團"
         data-date="2026.02.13"
         data-desc="夢回舞獅團出戰！">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.13</span>
        <span class="title">夢回舞獅團</span>
      </div>
    </div>

    <div class="item" data-category="daily"
         data-title="搖滾歌手"
         data-date="2026.02.16"
         data-desc="這是搖滾歌手還是殺手?">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.02.16</span>
        <span class="title">搖滾歌手 @曲絡寧</span>
      </div>
    </div>

  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="arrow left" id="prev">‹</div>

  <div class="lightbox-inner">
    <img id="light-img">
    <div class="lb-meta">
      <div class="lb-date" id="lb-date"></div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-desc" id="lb-desc"></div>
    </div>
  </div>

  <div class="arrow right" id="next">›</div>
</div>

<script>
//Masonry layout function logic (keep proportion in mind)
const grid = document.getElementById('grid');
const items = Array.from(document.querySelectorAll('.item'));

let current = 0;

/* masonry */
function layout(){
  const width = window.innerWidth;
  let cols;
  if (width < 500) {
      cols = 1;
  } else if (width < 800) {
      cols = 2;
  } else {
      cols = 3;
  }

  const gutter = 10;
  const colWidth = (grid.offsetWidth / cols) - (gutter * (cols - 1) / cols);
  
  const heights = Array(cols).fill(0);

  items.forEach(item=>{
    if(item.classList.contains('hide')) {
        item.style.display = 'none';
        return;
    }
    item.style.display = 'block';

    const isBig = item.classList.contains('v2') && cols > 1;

    let col;
    if (isBig && cols > 1) {
        //If it's big, try placing in col 0 if available, or where height is minimum if both fit
        if (cols === 3) {
            if (heights[0] <= heights[1] && heights[0] <= heights[2]) {
                col = 0;
            } else if (heights[1] <= heights[0] && heights[1] <= heights[2]) {
                col = 1; //Should only fit in 0 or 1 in 3cols
                if (col + 1 >= cols) col = 0;
            } else {
                col = 0;
            }
        } else if (cols === 2) {
             col = heights[0] <= heights[1] ? 0 : 0; //Forces span
             if (col + 1 >= cols) col = 0;
        }
    } else {
        col = heights.indexOf(Math.min(...heights));
    }

    const x = col * (colWidth + gutter);
    const y = heights[col];

    item.style.width = isBig && cols > 1 ? `${colWidth * 2 + gutter}px` : `${colWidth}px`;
    item.style.transform = `translate(${x}px, ${y}px)`;

    const h = item.offsetHeight + gutter;

    if(isBig && col + 1 < cols){
      //If spans, update both col heights to max
      const maxH = Math.max(heights[col] + h, heights[col+1] + h);
      heights[col] = maxH;
      heights[col + 1] = maxH;
    } else {
      heights[col] += h;
    }
  });

  grid.style.height = Math.max(...heights) + 'px';
}
/* filter */
document.querySelectorAll('.filter button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const f=btn.dataset.filter;

    items.forEach(item=>{
      item.classList.toggle('hide', !(f==='all'||item.dataset.category===f));
    });

    setTimeout(layout,10); //Short delay to allow reflow for correct height on unhide
  };
});

/* lightbox */
const lightbox=document.getElementById('lightbox');
const lightImg=document.getElementById('light-img');

const lbTitle=document.getElementById('lb-title');
const lbDate=document.getElementById('lb-date');
const lbDesc=document.getElementById('lb-desc');

function show(i){
  const item=items[i];
  lightImg.src=item.querySelector('img').src;
  lbTitle.textContent=item.dataset.title;
  lbDate.textContent=item.dataset.date;
  lbDesc.textContent=item.dataset.desc;
}

items.forEach((item,i)=>{
  item.onclick=()=>{
    current=i;
    show(i);
    lightbox.classList.add('show');
  };
});

document.getElementById('next').onclick=()=>{
  current=(current+1)%items.length;
  show(current);
};

document.getElementById('prev').onclick=()=>{
  current=(current-1+items.length)%items.length;
  show(current);
};

document.addEventListener('keydown',e=>{
  if(!lightbox.classList.contains('show')) return;
  if(e.key==="ArrowRight") document.getElementById('next').click();
  if(e.key==="ArrowLeft") document.getElementById('prev').click();
  if(e.key==="Escape") lightbox.classList.remove('show');
});

lightbox.onclick=e=>{
  if(e.target===lightbox) lightbox.classList.remove('show');
};

window.addEventListener('load',layout);
window.addEventListener('resize',layout);
//Initial layout in case image loading is fast
layout();
</script>

</body>
</html>
