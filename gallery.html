```html
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --gold:#ffd76a;
}

/* ===== Base ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.15), transparent 30%),
    radial-gradient(circle at top right, rgba(139,92,246,.15), transparent 30%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:100px;
}

/* ===== Navbar ===== */
.topbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 40px);
  max-width:1100px;
  height:64px;
  display:flex;
  align-items:center;
  padding:0 16px;
  border-radius:999px;
  background:rgba(15,22,42,0.6);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  z-index:999;
}

.topbar-content{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  font-weight:700;
  font-size:14px;
}

.nav a{
  color:var(--muted);
  text-decoration:none;
  margin-left:10px;
  font-size:13px;
}

.nav a.active{
  color:#fff;
}

/* ===== Container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== Header ===== */
.page-header{
  text-align:center;
  margin-bottom:30px;
}

.page-header h1{
  font-size:38px;
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== Filter ===== */
.gallery-filter{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:30px;
}

.filter-btn{
  padding:8px 18px;
  border-radius:999px;
  border:1px solid var(--line);
  cursor:pointer;
}

.filter-btn.active{
  background:var(--accent);
  color:#fff;
}

/* ===== Masonry ===== */
.gallery-grid{
  column-count:3;
  column-gap:18px;
}

@media (max-width:900px){
  .gallery-grid{ column-count:2; }
}

@media (max-width:600px){
  .gallery-grid{ column-count:1; }
}

.gallery-item{
  break-inside:avoid;
  margin-bottom:18px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.gallery-item:hover{
  transform:translateY(-5px);
}

/* image */
.gallery-img{
  width:100%;
  display:block;
}

/* overlay */
.gallery-info{
  position:absolute;
  inset:0;
  padding:16px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  background:linear-gradient(to top,rgba(0,0,0,.75),transparent);
  opacity:0;
  transition:.3s;
}

.gallery-item:hover .gallery-info{
  opacity:1;
}

/* ===== Lightbox ===== */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.lightbox.show{ display:flex; }

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:14px;
}

.lightbox-controls{
  margin-top:20px;
  display:flex;
  gap:20px;
}

.ctrl{
  cursor:pointer;
  padding:10px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
}

/* arrows */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:30px;
  cursor:pointer;
  padding:10px;
}

.arrow.left{ left:20px; }
.arrow.right{ right:20px; }

</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand">夢回花深處</div>
    <div class="nav">
      <a href="#">首頁</a>
      <a class="active">回憶錄</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="page-header">
  <h1>江湖回憶錄</h1>
</div>

<div class="gallery-filter">
  <div class="filter-btn active" data-filter="all">全部</div>
  <div class="filter-btn" data-filter="nye">跨年夜</div>
  <div class="filter-btn" data-filter="daily">日常</div>
</div>

<div class="gallery-grid" id="gallery">

  <!-- items -->
  <div class="gallery-item" data-category="nye">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
  </div>

  <div class="gallery-item" data-category="daily">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
  </div>

  <div class="gallery-item" data-category="daily">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img">
  </div>

</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="arrow left" id="prev">‹</div>
  <img id="light-img">
  <div class="arrow right" id="next">›</div>
</div>

<script>

const items = Array.from(document.querySelectorAll('.gallery-item'));
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('light-img');

let currentIndex = 0;

/* open */
items.forEach((item,i)=>{
  item.onclick = ()=>{
    currentIndex = i;
    showImage();
    lightbox.classList.add('show');
  };
});

function showImage(){
  const img = items[currentIndex].querySelector('img');
  lightImg.src = img.src;
}

/* next prev */
document.getElementById('next').onclick = ()=>{
  currentIndex = (currentIndex + 1) % items.length;
  showImage();
};

document.getElementById('prev').onclick = ()=>{
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  showImage();
};

/* keyboard */
document.addEventListener('keydown', e=>{
  if(!lightbox.classList.contains('show')) return;

  if(e.key === 'ArrowRight') document.getElementById('next').click();
  if(e.key === 'ArrowLeft') document.getElementById('prev').click();
  if(e.key === 'Escape') lightbox.classList.remove('show');
});

/* close */
lightbox.onclick = (e)=>{
  if(e.target === lightbox){
    lightbox.classList.remove('show');
  }
};

/* filter */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const f = btn.dataset.filter;

    items.forEach(item=>{
      item.style.display =
        (f==='all'||item.dataset.category===f)
        ? 'block' : 'none';
    });
  };
});

</script>

</body>
</html>
