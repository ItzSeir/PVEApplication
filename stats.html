<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜數據與脈絡</title>

<meta name="view-transition" content="same-origin" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

<style>
:root {
  --bg:#040812;
  --bg2:#0b1120;
  --panel:rgba(255,255,255,0.05);
  --line:rgba(255,255,255,0.1);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#4facfe;

  --gen1:#1e40af;
  --gen2:#0891b2;
  --gen3:#7c3aed;
  --gen4:#db2777;
  --gen5:#ea580c;
}

body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-top:110px;
}

/* ===== NAVBAR（完全保留） ===== */
.topbar {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 1100px; height: 64px; z-index: 1000;
  display: flex; align-items: center; padding: 0 12px; border-radius: 999px;
  background: rgba(15, 22, 42, 0.6); backdrop-filter: blur(20px);
  border: 1px solid var(--line);
}
.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.brand-group { display:flex; gap:8px; cursor:pointer; }
.brand-badge { padding:6px 14px; border-radius:999px; background:rgba(255,255,255,0.06); font-size:12px; font-weight:700; }
.nav { display:flex; gap:8px; }
.nav a { text-decoration:none; color:var(--muted); padding:8px 18px; border-radius:999px; font-size:13px; font-weight:600; }
.nav a.active { color:#fff; background:rgba(255,255,255,0.12); }
.nav a.home-btn { color:#fff; background:linear-gradient(135deg,var(--accent),#8b5cf6); }

/* ===== layout ===== */
.container{ max-width:1300px; margin:auto; padding:0 20px; }
.page-header{ text-align:center; margin-bottom:40px; }
.page-title{
  font-size:36px;
  font-weight:900;
  background:linear-gradient(to right,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== cards ===== */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.stat-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:24px;
}

.stat-card.full{
  grid-column:span 3;
  height:760px;
  position:relative;
  overflow:hidden;
}

/* ===== GRAPH BACKGROUND ===== */
#cy{
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at center, #0b1426 0%, #040812 100%);
}

/* ===== legend ===== */
.legend{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,0.5);
  padding:14px;
  border-radius:12px;
  border:1px solid var(--line);
}

.legend-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:#ccc;
}

.dot{ width:8px; height:8px; border-radius:50%; }

/* ===== tooltip ===== */
.tooltip{
  position:fixed;
  background:rgba(0,0,0,0.8);
  color:#fff;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  pointer-events:none;
  opacity:0;
  z-index:9999;
}

/* ===== graph effects ===== */
.node-hover {
  border-width:2px !important;
  box-shadow:0 0 15px rgba(255,255,255,0.4);
  transform:scale(1.25);
}

.edge-fade {
  opacity:0.08 !important;
}
</style>
</head>

<body>

<!-- NAVBAR 不動 -->
<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group" onclick="location.href='index.html'">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge">實時數據</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">江湖數據</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="page-header">
  <h1 class="page-title">幫會數據與師徒脈絡</h1>
</div>

<div class="stats-grid">

<div class="stat-card">幫會成員 62/100</div>
<div class="stat-card">等級分布</div>
<div class="stat-card">領地 85%</div>

<div class="stat-card full">
  <div id="cy"></div>

  <div class="legend">
    <div class="legend-item"><span class="dot" style="background:var(--gen1)"></span>第一代（核心）</div>
    <div class="legend-item"><span class="dot" style="background:var(--gen2)"></span>第二代</div>
    <div class="legend-item"><span class="dot" style="background:var(--gen3)"></span>第三代</div>
    <div class="legend-item"><span class="dot" style="background:var(--gen4)"></span>第四代</div>
    <div class="legend-item"><span class="dot" style="background:var(--gen5)"></span>第五代</div>
  </div>
</div>

</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){

const tooltip = document.getElementById('tooltip');

const cy = cytoscape({
  container: document.getElementById('cy'),

  /* 🔥 關鍵：改 layout（不再亂飛） */
  layout: {
    name: 'breadthfirst',
    directed: true,
    spacingFactor: 1.5,
    padding: 40,
    roots: ['姜澈','芝士漢堡','楚小閣','鯨滿','白雲凌','蘋','乖乖']
  },

  style: [

    {
      selector:'node',
      style:{
        'label':'data(id)',
        'color':'#fff',
        'font-size':'10px',
        'text-valign':'center',
        'text-halign':'center',
        'shape':'round-rectangle',
        'width':'65px',
        'height':'24px',
        'background-color':'#1e293b',
        'border-width':1,
        'border-color':'rgba(255,255,255,0.2)',
        'transition-property':'transform, background-color, border-color',
        'transition-duration':'0.25s'
      }
    },

    {
      selector:'edge',
      style:{
        'width':1.5,
        'line-color':'rgba(255,255,255,0.12)',
        'curve-style':'bezier',
        'target-arrow-shape':'vee',
        'target-arrow-color':'rgba(255,255,255,0.2)'
      }
    },

    { selector:'.g1', style:{'background-color':'var(--gen1)','width':'90px','height':'32px'}},
    { selector:'.g2', style:{'background-color':'var(--gen2)'}},
    { selector:'.g3', style:{'background-color':'var(--gen3)'}},
    { selector:'.g4', style:{'background-color':'var(--gen4)'}},
    { selector:'.g5', style:{'background-color':'var(--gen5)'}}

  ],

  elements:[ /* 👈 保留你全部資料不動 */
    { data:{id:'姜澈'}, classes:'g1' },
    { data:{id:'芝士漢堡'}, classes:'g1' },
    { data:{id:'楚小閣'}, classes:'g1' },
    { data:{id:'鯨滿'}, classes:'g1' },
    { data:{id:'白雲凌'}, classes:'g1' },
    { data:{id:'蘋'}, classes:'g1' },
    { data:{id:'乖乖'}, classes:'g1' },

    { data:{id:'花臻茵'}, classes:'g2' },
    { data:{source:'姜澈', target:'花臻茵'} },

    { data:{id:'曲絡寧'}, classes:'g2' },
    { data:{source:'花臻茵', target:'曲絡寧'} },

    { data:{id:'似水'}, classes:'g3' },
    { data:{source:'花臻茵', target:'似水'} }
  ]
});

/* ===== hover glow ===== */
cy.on('mouseover','node',e=>{
  cy.elements().addClass('edge-fade');
  e.target.removeClass('edge-fade').style('z-index',999);
});

cy.on('mouseout','node',()=>{
  cy.elements().removeClass('edge-fade');
});

/* tooltip */
cy.on('mousemove', e=>{
  tooltip.style.left = e.originalEvent.clientX+10+'px';
  tooltip.style.top = e.originalEvent.clientY+10+'px';
});

cy.on('mouseover','node',e=>{
  tooltip.style.opacity=1;
  tooltip.innerHTML=e.target.id();
});

cy.on('mouseout',()=>tooltip.style.opacity=0);

});
</script>

</body>
</html>
