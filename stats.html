<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜數據與脈絡</title>

<meta name="view-transition" content="same-origin" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

<style>
:root {
  --bg: #040812;
  --bg2: #0b1120;
  --panel: rgba(255, 255, 255, 0.05);
  --line: rgba(255, 255, 255, 0.1);
  --text: #eef2ff;
  --muted: #a8b3cf;
  --accent: #4facfe;
  --gold: #ffd76a;
  /* 世代配色 */
  --gen1: #1e40af; --gen2: #0891b2; --gen3: #7c3aed; --gen4: #db2777; --gen5: #ea580c;
}

body {
  margin: 0;
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-top: 110px;
  min-height: 100vh;
}

/* ===== Navbar ===== */
.topbar {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 1100px; height: 64px; z-index: 1000;
  display: flex; align-items: center; padding: 0 12px; border-radius: 999px;
  background: rgba(15, 22, 42, 0.6); backdrop-filter: blur(20px);
  border: 1px solid var(--line);
}
.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.brand-group { display: flex; gap: 8px; cursor: pointer; }
.brand-badge { padding: 6px 14px; border-radius: 999px; background: rgba(255,255,255,0.06); font-size: 12px; font-weight: 700; }
.nav { display: flex; gap: 8px; }
.nav a { text-decoration: none; color: var(--muted); padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; transition: 0.3s; }
.nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
.nav a.home-btn { color: #fff; background: linear-gradient(135deg, var(--accent), #8b5cf6); }

/* ===== Layout ===== */
.container { max-width: 1300px; margin: auto; padding: 0 20px; }
.page-header { text-align: center; margin-bottom: 40px; }
.page-title { font-size: 36px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; padding: 24px; }
.stat-card.full { grid-column: span 3; padding: 0; position: relative; height: 750px; overflow: hidden; border-radius: 30px; }

.stat-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 15px; display: block; letter-spacing: 1px; }
.stat-value { font-size: 36px; font-weight: 800; display: block; margin-bottom: 5px; }

/* ===== Graph ===== */
#cy { width: 100%; height: 100%; background: radial-gradient(circle at center, #0b1426 0%, #040812 100%); }

/* ===== Legend ===== */
.legend {
  position: absolute; bottom: 20px; right: 20px;
  background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px;
  border: 1px solid var(--line); backdrop-filter: blur(10px); z-index: 10;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #ccc; margin-bottom: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }

/* ===== Tooltip & Highlight Styles ===== */
.tooltip {
  position: fixed; padding: 8px 12px; background: rgba(15, 22, 42, 0.9);
  border: 1px solid var(--accent); color: #fff; border-radius: 6px;
  font-size: 12px; pointer-events: none; opacity: 0; z-index: 9999;
}
.faded { opacity: 0.15; transition: opacity 0.3s; }
.highlighted { border: 2px solid #fff !important; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group" onclick="location.href='index.html'">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">實時數據</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">江湖數據</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">幫會數據與師徒脈絡</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-title">幫會成員數</span>
      <div class="stat-value">62 <small style="font-size: 14px; color:var(--muted)">/ 100</small></div>
      <p style="color:var(--muted); font-size: 13px;">活躍狀態：<span style="color:#10b981">極高 (S)</span></p>
    </div>

    <div class="stat-card">
      <span class="stat-title">等級梯隊</span>
      <div style="line-height: 1.8; font-size: 14px;">
        <span style="color:var(--gold)">宗師級</span> 12人<br>
        <span style="color:var(--gold)">精英級</span> 35人<br>
        <span style="color:var(--gold)">中堅級</span> 15人
      </div>
    </div>

    <div class="stat-card">
      <span class="stat-title">領地解鎖進度</span>
      <div class="stat-value">85%</div>
      <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px;">
        <div style="width:85%; height:100%; background:var(--accent); border-radius:2px;"></div>
      </div>
    </div>

    <div class="stat-card full">
      <div id="cy"></div>
      <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--gen1)"></span> 第一代 (最大)</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen2)"></span> 第二代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen3)"></span> 第三代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen4)"></span> 第四代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen5)"></span> 第五代 (最小)</div>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){
const tooltip = document.getElementById('tooltip');

// 獲取 CSS 顏色變數
const styles = getComputedStyle(document.documentElement);
const colors = {
    gen1: styles.getPropertyValue('--gen1').trim(),
    gen2: styles.getPropertyValue('--gen2').trim(),
    gen3: styles.getPropertyValue('--gen3').trim(),
    gen4: styles.getPropertyValue('--gen4').trim(),
    gen5: styles.getPropertyValue('--gen5').trim()
};

const cy = cytoscape({
  container: document.getElementById('cy'),
  
  // ===== 鎖定縮放設定 =====
  minZoom: 1,
  maxZoom: 1,
  userZoomingEnabled: false, // 禁止縮放
  panningEnabled: true,      // 允許平移拖拽

  style: [
    { 
      selector: 'node', 
      style: { 
        'label': 'data(id)', 
        'color': '#fff',
        'font-size': '10px',
        'font-weight': 'bold', // 文字加粗
        'text-valign': 'center',
        'text-halign': 'center',
        'background-color': '#1e293b',
        'shape': 'round-rectangle',
        'border-width': 1,
        'border-color': 'rgba(255,255,255,0.2)',
        'transition-property': 'background-color, border-color, border-width, width, height',
        'transition-duration': '0.3s'
      }
    },
    { 
      selector: 'edge', 
      style: { 
        'width': 1.5,
        'line-color': 'rgba(255,255,255,0.15)',
        'curve-style': 'straight',
        'target-arrow-shape': 'vee',
        'target-arrow-color': 'rgba(255,255,255,0.2)',
        'arrow-scale': 0.8
      }
    },
    // ===== 節點大小隨世代遞減 =====
    { selector: '.g1', style: { 'background-color': colors.gen1, 'width': '85px', 'height': '32px', 'font-size': '11px' }},
    { selector: '.g2', style: { 'background-color': colors.gen2, 'width': '70px', 'height': '26px' }},
    { selector: '.g3', style: { 'background-color': colors.gen3, 'width': '60px', 'height': '22px' }},
    { selector: '.g4', style: { 'background-color': colors.gen4, 'width': '55px', 'height': '20px', 'font-size': '9px' }},
    { selector: '.g5', style: { 'background-color': colors.gen5, 'width': '45px', 'height': '18px', 'font-size': '8px' }}
  ],

  elements: [
    /* 第一代 */
    { data: { id: '姜澈' }, classes: 'g1' },
    { data: { id: '芝士漢堡' }, classes: 'g1' },
    { data: { id: '楚小閣' }, classes: 'g1' },
    { data: { id: '鯨滿' }, classes: 'g1' },
    { data: { id: '白雲凌' }, classes: 'g1' },
    { data: { id: '蘋' }, classes: 'g1' },
    { data: { id: '乖乖' }, classes: 'g1' },

    /* 第二代 */
    { data: { id: '花臻茵' }, classes: 'g2' }, { data: { source: '姜澈', target: '花臻茵' } },
    { data: { id: '曲絡寧' }, classes: 'g2' }, { data: { source: '花臻茵', target: '曲絡寧' } },
    { data: { id: '顧立舟' }, classes: 'g2' }, { data: { source: '芝士漢堡', target: '顧立舟' } },
    { data: { id: '葉染塵' }, classes: 'g2' }, { data: { source: '芝士漢堡', target: '葉染塵' } },
    { data: { id: '一杯豆漿' }, classes: 'g2' }, { data: { source: '芝士漢堡', target: '一杯豆漿' } },
    { data: { id: '稚米' }, classes: 'g2' }, { data: { source: '楚小閣', target: '稚米' } },
    { data: { id: '姬蕭遙' }, classes: 'g2' }, { data: { source: '鯨滿', target: '姬蕭遙' } },
    { data: { id: '無名' }, classes: 'g2' }, { data: { source: '白雲凌', target: '無名' } },
    { data: { id: '冉冉生煙' }, classes: 'g2' }, { data: { source: '蘋', target: '冉冉生煙' } },

    /* 第三代 */
    { data: { id: '似水' }, classes: 'g3' }, { data: { source: '花臻茵', target: '似水' } },
    { data: { id: '白離' }, classes: 'g3' }, { data: { source: '曲絡寧', target: '白離' } },
    { data: { id: '羽玄' }, classes: 'g3' }, { data: { source: '顧立舟', target: '羽玄' } },
    { data: { source: '乖乖', target: '羽玄' } },

    /* 第四代 */
    { data: { id: '酥酥不酥' }, classes: 'g4' }, { data: { source: '似水', target: '酥酥不酥' } },
    { data: { id: '青葉' }, classes: 'g4' }, { data: { source: '似水', target: '青葉' } },
    { data: { id: '郁竹' }, classes: 'g4' }, { data: { source: '似水', target: '郁竹' } },
    { data: { id: '沐雨橙風' }, classes: 'g4' }, { data: { source: '白離', target: '沐雨橙風' } },
    { data: { id: '雨宮天' }, classes: 'g4' }, { data: { source: '白離', target: '雨宮天' } },
    { data: { id: '筱風' }, classes: 'g4' }, { data: { source: '雨宮天', target: '筱風' } },
    { data: { id: '艾倫' }, classes: 'g4' }, { data: { source: '雨宮天', target: '艾倫' } },
    { data: { id: '東方念' }, classes: 'g4' }, { data: { source: '雨宮天', target: '東方念' } },

    /* 第五代 */
    { data: { id: '多多' }, classes: 'g5' }, { data: { source: '青葉', target: '多多' } },
    { data: { id: '少音' }, classes: 'g5' }, { data: { source: '青葉', target: '少音' } },
    { data: { id: '染冉' }, classes: 'g5' }, { data: { source: '沐雨橙風', target: '染冉' } }
  ],

  layout: { 
    name: 'cose', 
    animate: true, 
    nodeRepulsion: 15000, 
    idealEdgeLength: 100, 
    padding: 60 
  }
});

/* Hover Interaction */
cy.on('mouseover', 'node', e => {
  tooltip.innerHTML = `成員: ${e.target.id()}`;
  tooltip.style.opacity = 1;
});
cy.on('mousemove', e => {
  tooltip.style.left = e.originalEvent.clientX + 15 + 'px';
  tooltip.style.top = e.originalEvent.clientY + 15 + 'px';
});
cy.on('mouseout', 'node', () => tooltip.style.opacity = 0);

/* Click Highlight Logic */
cy.on('tap', function(e) {
  if (e.target === cy) {
    cy.elements().removeClass('faded highlighted');
  } else if (e.target.isNode()) {
    const node = e.target;
    cy.elements().addClass('faded').removeClass('highlighted');
    const neighborhood = node.closedNeighborhood();
    neighborhood.removeClass('faded').addClass('highlighted');
  }
});

// 跳轉動畫邏輯
document.querySelectorAll('.nav a, .home-btn, .brand-group').forEach(link => {
  link.onclick = (e) => {
    const targetUrl = link.getAttribute('href');
    if (!targetUrl || targetUrl.startsWith('#')) return;

    if (document.startViewTransition) {
      e.preventDefault();
      document.startViewTransition(() => {
        location.href = targetUrl;
      });
    }
  };
});

window.addEventListener('resize', () => cy.layout({ name: 'cose' }).run());

});
</script>

</body>
</html>
