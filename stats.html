<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜數據與脈絡</title>

<meta name="view-transition" content="same-origin" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

<style>
:root {
  --bg: #040812;
  --panel: rgba(13, 20, 38, 0.8);
  --accent: #4facfe;
  --accent2: #00f2fe;
  --line: rgba(255, 255, 255, 0.1);
  /* 世代配色 - 取自 Flourish 高級色盤 */
  --c1: #3b82f6; --c2: #06b6d4; --c3: #8b5cf6; --c4: #ec4899; --c5: #f97316;
}

body {
  margin: 0; font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg); color: #fff;
  overflow-x: hidden;
}

/* ===== Navbar ===== */
.topbar {
  position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; background: rgba(4, 8, 18, 0.9);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--line);
}
.nav a { color: #a8b3cf; text-decoration: none; margin-left: 25px; font-weight: 700; font-size: 14px; transition: 0.3s; }
.nav a.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

/* ===== 佈局容器 ===== */
.container { max-width: 1400px; margin: 100px auto 50px; padding: 0 20px; }

.header-section { text-align: center; margin-bottom: 40px; }
.header-section h1 { font-size: 32px; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; }
.header-section p { color: #5c6b89; font-size: 12px; letter-spacing: 2px; }

/* ===== 數據小卡 ===== */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
.mini-card { background: var(--panel); border: 1px solid var(--line); padding: 20px; border-radius: 12px; }
.mini-label { font-size: 12px; color: #5c6b89; margin-bottom: 8px; }
.mini-value { font-size: 24px; font-weight: 700; color: #fff; }

/* ===== 重點：Network Graph 區塊 ===== */
.chart-container {
  background: #080d1a;
  border: 1px solid var(--line);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  height: 700px;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
}

/* 模擬水墨噴濺背景 */
.ink-bg {
  position: absolute; inset: 0;
  background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
  opacity: 0.1; pointer-events: none;
}
.splash {
  position: absolute; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(79, 172, 254, 0.05) 0%, transparent 70%);
  filter: blur(50px); pointer-events: none;
}

#cy { width: 100%; height: 100%; z-index: 5; }

/* 圖例樣式 */
.legend {
  position: absolute; bottom: 30px; right: 30px;
  background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;
  backdrop-filter: blur(10px); z-index: 10; border: 1px solid var(--line);
}
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #ccc; margin-bottom: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }

</style>
</head>
<body>

<nav class="topbar">
  <div style="font-weight: 900; letter-spacing: 2px;">夢回花深處｜江湖統計</div>
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="gallery.html">江湖回憶錄</a>
    <a href="stats.html" class="active">實時數據</a>
  </div>
</nav>

<div class="container">
  <div class="header-section">
    <h1>數據統計與師徒傳承</h1>
    <p>REAL-TIME DATA & LINEAGE RELATIONSHIP</p>
  </div>

  <div class="stats-row">
    <div class="mini-card"><div class="mini-label">江湖人數</div><div class="mini-value">20,000</div></div>
    <div class="mini-card"><div class="mini-label">活躍成員</div><div class="mini-value">156,300</div></div>
    <div class="mini-card"><div class="mini-label">實時數據</div><div class="mini-value">349</div></div>
    <div class="mini-card"><div class="mini-label">江湖分數率</div><div class="mini-value">16.44%</div></div>
  </div>

  <div class="chart-container">
    <div class="ink-bg"></div>
    <div class="splash" style="top: 10%; left: 20%;"></div>
    <div class="splash" style="bottom: 10%; right: 10%;"></div>
    
    <div id="cy"></div>

    <div class="legend">
      <div class="legend-item"><span class="dot" style="background:var(--c1)"></span> Generation 1</div>
      <div class="legend-item"><span class="dot" style="background:var(--c2)"></span> Generation 2</div>
      <div class="legend-item"><span class="dot" style="background:var(--c3)"></span> Generation 3</div>
      <div class="legend-item"><span class="dot" style="background:var(--c4)"></span> Generation 4</div>
      <div class="legend-item"><span class="dot" style="background:var(--c5)"></span> Generation 5</div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const cy = cytoscape({
    container: document.getElementById('cy'),
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(id)',
          'color': '#fff',
          'font-size': '10px',
          'font-family': 'Noto Sans TC',
          'font-weight': 'bold',
          'text-valign': 'center',
          'text-halign': 'center',
          'background-color': 'rgba(255,255,255,0.1)',
          'border-width': 1,
          'border-color': 'rgba(255,255,255,0.3)',
          'shape': 'round-rectangle', // 膠囊形狀
          'width': '60px',
          'height': '22px',
          'text-outline-width': 0,
          'overlay-opacity': 0
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': 'rgba(255, 255, 255, 0.1)',
          'curve-style': 'unbundled-bezier', // 優雅的曲線
          'control-point-distances': [20, -20],
          'target-arrow-shape': 'triangle',
          'target-arrow-color': 'rgba(255, 255, 255, 0.1)',
          'arrow-scale': 0.8,
          'opacity': 0.4
        }
      },
      // 世代特定樣式 (模擬圖片中的標籤色)
      { selector: '.g1', style: { 'background-color': '#1e40af', 'width': '70px', 'height': '26px' } },
      { selector: '.g2', style: { 'background-color': '#0891b2' } },
      { selector: '.g3', style: { 'background-color': '#7c3aed' } },
      { selector: '.g4', style: { 'background-color': '#db2777' } },
      { selector: '.g5', style: { 'background-color': '#ea580c' } },
      
      // 滑鼠懸停效果
      { selector: 'node:hover', style: { 'border-color': '#fff', 'border-width': 2, 'width': '80px' } },
      { selector: 'edge:hover', style: { 'line-color': '#4facfe', 'width': 3, 'opacity': 1 } }
    ],
    elements: [
      // 節點與連線 (已簡化為核心關係)
      { data: { id: '姜澈' }, classes: 'g1' },
      { data: { id: '花臻茵' }, classes: 'g2' }, { data: { source: '姜澈', target: '花臻茵' } },
      { data: { id: '似水' }, classes: 'g3' }, { data: { source: '花臻茵', target: '似水' } },
      { data: { id: '曲絡寧' }, classes: 'g2' }, { data: { source: '花臻茵', target: '曲絡寧' } },
      { data: { id: '酥酥不酥' }, classes: 'g4' }, { data: { source: '似水', target: '酥酥不酥' } },
      { data: { id: '青葉' }, classes: 'g4' }, { data: { source: '似水', target: '青葉' } },
      { data: { id: '多多' }, classes: 'g5' }, { data: { source: '青葉', target: '多多' } },
      { data: { id: '白離' }, classes: 'g3' }, { data: { source: '曲絡寧', target: '白離' } },
      { data: { id: '沐雨橙風' }, classes: 'g4' }, { data: { source: '白離', target: '沐雨橙風' } },
      { data: { id: '雨宮天' }, classes: 'g4' }, { data: { source: '白離', target: '雨宮天' } },
      { data: { id: '芝士漢堡' }, classes: 'g1' },
      { data: { id: '顧立舟' }, classes: 'g2' }, { data: { source: '芝士漢堡', target: '顧立舟' } },
      { data: { id: '楚小閣' }, classes: 'g1' },
      { data: { id: '稚米' }, classes: 'g2' }, { data: { source: '楚小閣', target: '稚米' } }
    ],
    layout: {
      name: 'cose',
      padding: 100,
      nodeRepulsion: 15000,
      idealEdgeLength: 120,
      animate: true,
      animationDuration: 1500
    }
  });
});
</script>

</body>
</html>
