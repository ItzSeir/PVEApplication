<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖數據庫</title>

<meta name="view-transition" content="same-origin" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.1);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
}

/* ===== 頁面切換動畫定義 ===== */
@keyframes fade-in { from { opacity: 0; transform: translateY(10px); } }
@keyframes fade-out { to { opacity: 0; transform: translateY(-10px); } }

::view-transition-old(root) { animation: 0.3s ease both fade-out; }
::view-transition-new(root) { animation: 0.4s ease 0.1s both fade-in; }

/* ===== 基礎樣式 ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.12), transparent 30%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
  min-height: 100vh;
}

/* ===== Navbar (與其他頁面統一) ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  view-transition-name: main-nav; /* 導航欄固定不參與動畫 */
}

.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.brand-group { display: flex; gap: 8px; cursor: pointer; }
.brand-badge { padding: 6px 14px; border-radius: 999px; background: rgba(255,255,255,0.06); font-size: 12px; font-weight: 700; }
.nav { display: flex; gap: 8px; }
.nav a { text-decoration: none; color: var(--muted); padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; transition: 0.3s; }
.nav a:hover { color: #fff; background: rgba(255,255,255,0.1); }
.nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
.nav a.home-btn { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }

/* ===== 內容區域 ===== */
.container { max-width: 1100px; margin: auto; padding: 40px 20px; }

.page-header { text-align: center; margin-bottom: 60px; }
.page-title { font-size: 36px; font-weight: 800; margin: 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.page-subtitle { color: var(--muted); margin-top: 10px; font-size: 14px; letter-spacing: 4px; }

/* ===== 數據看板佈局 (Pinterest 風格卡片) ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
}

.stat-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 30px;
  transition: transform 0.3s ease, border-color 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-5px);
  border-color: rgba(110,168,255,0.4);
  background: rgba(255,255,255,0.08);
}

.stat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.stat-title { font-size: 18px; font-weight: 700; color: var(--accent); }
.stat-value { font-size: 32px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }

/* 進度條樣式 */
.progress-container { margin-top: 15px; }
.progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.progress-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; width: 0; transition: width 1.5s cubic-bezier(0.1, 0.5, 0.1, 1); }

/* 分類列表樣式 */
.data-list { list-style: none; padding: 0; margin: 20px 0 0; }
.data-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  font-size: 15px;
}
.data-item:last-child { border-bottom: none; }
.data-label { color: var(--muted); }
.data-num { color: var(--gold); font-weight: 700; }

</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group" onclick="location.href='index.html'">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖數據庫</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">江湖數據庫</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">幫會數據分析</h1>
    <p class="page-subtitle">1</p>
  </div>

  <div class="stats-grid">
    
    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-title">當前成員數</span>
        <span class="stat-value">62</span>
      </div>
      <div class="progress-container">
        <div class="progress-label">
          <span>幫會容納量</span>
          <span>62 / 100</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill" style="width: 62%;"></div>
        </div>
      </div>
      <ul class="data-list">
        <li class="data-item"><span class="data-label">活躍成員</span><span class="data-num">58</span></li>
        <li class="data-item"><span class="data-label">平均戰力</span><span class="data-num">125,400</span></li>
      </ul>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-title">成員等級分布</span>
      </div>
      <ul class="data-list">
        <li class="data-item"><span class="data-label">100級以上 (宗師)</span><span class="data-num">12 人</span></li>
        <li class="data-item"><span class="data-label">90 - 99 級</span><span class="data-num">28 人</span></li>
        <li class="data-item"><span class="data-label">80 - 89 級</span><span class="data-num">15 人</span></li>
        <li class="data-item"><span class="data-label">80 級以下</span><span class="data-num">7 人</span></li>
      </ul>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-title">當前俠境進度</span>
        <span class="stat-value">85%</span>
      </div>
      <div class="progress-container">
        <div class="progress-label">
          <span>地圖探索度</span>
          <span>高階領地</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill" style="width: 85%; background: var(--gold);"></div>
        </div>
      </div>
      <p style="font-size: 13px; color: var(--muted); margin-top: 15px; line-height: 1.5;">
        幫會已成功佔領主要交通要道，正在向核心據點推進。
      </p>
    </div>

  </div>
</div>

<script>
// 頁面進入時觸發進度條動畫
window.addEventListener('load', () => {
  document.querySelectorAll('.progress-fill').forEach(bar => {
    // 重新觸發寬度，讓 CSS transition 起作用
    const targetWidth = bar.style.width;
    bar.style.width = '0';
    setTimeout(() => {
      bar.style.width = targetWidth;
    }, 100);
  });
});

// 通用跨頁切換邏輯 (與 Gallery 頁面通用)
document.querySelectorAll('.nav a, .home-btn, .brand-group').forEach(link => {
  link.onclick = (e) => {
    const targetUrl = link.getAttribute('href');
    if (!targetUrl || targetUrl.startsWith('#')) return;

    if (document.startViewTransition) {
      e.preventDefault();
      document.startViewTransition(() => {
        location.href = targetUrl;
      });
    }
  };
});
</script>

</body>
</html>
